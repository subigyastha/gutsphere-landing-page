    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Gutsphere",
        "applicationCategory": "HealthApplication",
        "operatingSystem": "iOS, Android, Web",
        "description": "Gutsphere is your GI health copilot — helping you move from digestive confusion to clarity, clinical readiness, treatment support, and long-term control.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Is this medical advice?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. Gutsphere isn't a doctor and doesn't replace medical care. It's a daily system that helps you track what's happening, learn what affects you, and show up to appointments with clearer context and evidence."
            }
          },
          {
            "@type": "Question",
            "name": "Do I need to track every day for this to work?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. Gutsphere is built for low-energy, real-life use. Light tracking still helps, and 'nothing happened' days can still be meaningful. The goal is consistency that's sustainable — no streaks, no guilt, no penalties."
            }
          },
          {
            "@type": "Question",
            "name": "How is my data handled?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Your health story is private by default. You decide what to log, and you decide what to export or share. Your data isn't treated like content for a feed, and sharing with a clinician or caregiver is always intentional — never automatic."
            }
          },
          {
            "@type": "Question",
            "name": "Can I use this alongside my doctor or treatment plan?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes — that's the point. Gutsphere is built to complement care by helping you keep a clearer symptom history, notice patterns earlier, and bring a cleaner story into appointments, tests, and procedures."
            }
          },
          {
            "@type": "Question",
            "name": "What conditions is this for?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Gutsphere is built for the full GI journey — whether you're dealing with constipation, bloating, reflux, IBS, IBD, or an unclear mix of symptoms. You don't need a diagnosis to start, and nothing you track is lost if you get one later."
            }
          },
          {
            "@type": "Question",
            "name": "Will reminders be pushy or guilt-inducing?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. Reminders are meant to feel like calm check-ins, not discipline. If you miss a day, nothing breaks. You can slow down and pick back up anytime."
            }
          },
          {
            "@type": "Question",
            "name": "Do I need a credit card to start? Can I cancel anytime?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No card needed — the Free plan is free to start on web, iOS or Android. Paid plans are cancel-anytime; the founding annual rate of $69/year stays locked in for as long as you keep it."
            }
          }
        ]
      }
    </script>
